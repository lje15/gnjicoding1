            { u: 'rear_306', v: 'rear_3f_east', w: 20, desc: '3층 구름다리와 통하는 동측 연결로에 안착합니다.' },

            // Rear Building 4F
            { u: 'rear_4f_lobby', v: 'rear_3_staff', w: 45, desc: '새로 만들어진 후동 4층 계단실에서 서쪽 맨 왼편 끝에 완벽히 구축된 3학년 교무실로 이동합니다.' }
        ];

        const runDijkstra = (startNodeId, endNodeId, isBarrierFree = false) => {
            if (!MAP_NODES[startNodeId] || !MAP_NODES[endNodeId]) return [];
            const distances = {};
            const previous = {};
            const queue = [];

            Object.keys(MAP_NODES).forEach(nodeId => {
                distances[nodeId] = Infinity;
                previous[nodeId] = null;
                queue.push(nodeId);
            });

            distances[startNodeId] = 0;

            while (queue.length > 0) {
                queue.sort((a, b) => distances[a] - distances[b]);
                const current = queue.shift();

                if (current === endNodeId) break;
                if (distances[current] === Infinity) break;

                const neighbors = MAP_EDGES.filter(edge => {
                    if (isBarrierFree && edge.type === 'stair') {
                        return false; 
                    }
                    return edge.u === current || edge.v === current;
                });

                neighbors.forEach(edge => {
                    const neighbor = edge.u === current ? edge.v : edge.u;
                    if (!queue.includes(neighbor)) return;

                    const alt = distances[current] + edge.w;
                    if (alt < distances[neighbor]) {
                        distances[neighbor] = alt;
                        previous[neighbor] = current;
                    }
                });
            }

            const path = [];
            let curr = endNodeId;
            while (curr !== null) {
                path.unshift(curr);
                curr = previous[curr];
            }

            return path[0] === startNodeId ? path : [];
        };

        function App() {
            const [startNode, setStartNode] = useState('gate');
            const [endNode, setEndNode] = useState('main_music'); 
            const [activeTab, setActiveTab] = useState('view-3d'); 
            const [activeFloor, setActiveFloor] = useState(3); 
            const [isBarrierFree, setIsBarrierFree] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchType, setSearchType] = useState('destination'); 
            const [voiceEnabled, setVoiceEnabled] = useState(false);
            const [theme, setTheme] = useState('sunset'); 
            const [walkingAnim, setWalkingAnim] = useState(0); 
            const [isSimulating, setIsSimulating] = useState(false);
            const [voiceMessage, setVoiceMessage] = useState('스마트 길찾기가 활성화되었습니다. 출발지와 도착지를 고른 뒤 [안내 유도 시작] 버튼을 클릭해 보세요.');

            const canvasRef = useRef(null);
            const threeContainerRef = useRef(null);

            // Three.js References to manage memory safely
            const threeSceneRef = useRef(null);
            const threeRendererRef = useRef(null);
            const threeCameraRef = useRef(null);
            const threeControlsRef = useRef(null);
            const threeAnimationIdRef = useRef(null);
            const threePathTubeRef = useRef(null);
            const threeAvatarMeshRef = useRef(null);

            const activePath = useMemo(() => {
                return runDijkstra(startNode, endNode, isBarrierFree);
            }, [startNode, endNode, isBarrierFree]);

            const pathStats = useMemo(() => {
                if (activePath.length <= 1) return { distance: 0, time: 0 };
                let totalDist = 0;
                for (let i = 0; i < activePath.length - 1; i++) {
                    const u = activePath[i];
                    const v = activePath[i + 1];
                    const edge = MAP_EDGES.find(e => (e.u === u && e.v === v) || (e.u === v && e.v === u));
                    if (edge) totalDist += edge.w;
                }
                return {
                    distance: totalDist,
                    time: Math.ceil(totalDist / 1.5) 
                };
            }, [activePath]);

            const directionsList = useMemo(() => {
                if (activePath.length <= 1) return [];
                const directions = [];
                for (let i = 0; i < activePath.length - 1; i++) {
                    const u = activePath[i];
                    const v = activePath[i + 1];
                    const uNode = MAP_NODES[u];
                    const vNode = MAP_NODES[v];

                    const edge = MAP_EDGES.find(e => (e.u === u && e.v === v) || (e.u === v && e.v === u));
                    let stepDesc = edge ? edge.desc : `${vNode.name} 방면으로 이동합니다.`;

                    if (uNode.building !== vNode.building) {
                        if (vNode.building === 'main') {
                            stepDesc = `대운동장에서 본동 1층 현관 정문을 통해 로비 안으로 안전하게 진입합니다.`;
                        } else if (vNode.building === 'rear') {
                            stepDesc = `연결 통로를 거쳐 후동 건물로 안전하게 진입합니다.`;
                        } else if (vNode.id === 'cafeteria') {
                            stepDesc = `${uNode.name}에서 구름다리를 건너 2.5층 학생 급식소로 바로 진입합니다.`;
                        } else if (vNode.building === 'edu_center') {
                            stepDesc = `용봉 에듀센터 다목적 복합 교육동 방향으로 이동합니다.`;
                        }
                    }

                    if (uNode.floor !== vNode.floor && uNode.building === vNode.building) {
                        const icon = vNode.floor > uNode.floor ? '▲' : '▼';
                        stepDesc = `${uNode.name}에서 중앙 계단을 통해 건물 내부의 ${vNode.floor}층 구역으로 안전하게 이동합니다. (${icon} ${vNode.floor}F)`;
                    }

                    directions.push({
                        from: uNode,
                        to: vNode,
                        description: stepDesc,
                        distance: edge ? edge.w : 0
                    });
                }
                return directions;
            }, [activePath]);

            const speakText = (text) => {
                if (!voiceEnabled || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ko-KR';
                utterance.rate = 1.05;
                window.speechSynthesis.speak(utterance);
            };

            const triggerGuidance = () => {
                setIsSimulating(true);
                setWalkingAnim(0);
                const startingPoint = MAP_NODES[startNode].name;
                const currentDest = MAP_NODES[endNode].name;
                const textToSay = `${startingPoint}에서 출발하여, 최종 목적지인 ${currentDest}까지 최적 경로 안내 시뮬레이션을 시작하겠습니다.`;
                setVoiceMessage(textToSay);
                speakText(textToSay);
            };

            // Simulation loop
            useEffect(() => {
                if (!isSimulating) return;
                const timer = setInterval(() => {
                    setWalkingAnim(prev => {
                        if (prev >= 100) {
                            clearInterval(timer);
                            setIsSimulating(false);
                            const completionMsg = `최종 목적지에 무사히 도착했습니다. 가상 경로 유도 안내를 종료합니다.`;
                            setVoiceMessage(completionMsg);
                            speakText(completionMsg);
                            return 100;
                        }
                        return prev + 1.5;
                    });
                }, 100);
                return () => clearInterval(timer);
            }, [isSimulating]);

            // Filtered node list based on search
            const filteredNodes = useMemo(() => {
                if (!searchQuery.trim()) return [];
                const query = searchQuery.toLowerCase();
                return Object.values(MAP_NODES).filter(node => 
                    node.name.toLowerCase().includes(query) || 
                    node.desc.toLowerCase().includes(query)
                );
            }, [searchQuery]);

            const handleSearchResultSelect = (nodeId) => {
                if (searchType === 'start') {
                    setStartNode(nodeId);
                    setVoiceMessage(`출발지가 [${MAP_NODES[nodeId].name}]으로 성공적으로 변경되었습니다.`);
                } else {
                    setEndNode(nodeId);
                    setVoiceMessage(`도착지가 [${MAP_NODES[nodeId].name}]으로 성공적으로 변경되었습니다.`);
                }
                setSearchQuery('');
            };

            // Three.js Render Logic
            useEffect(() => {
                if (activeTab !== 'view-3d') {
                    if (threeRendererRef.current) {
                        threeRendererRef.current.dispose();
                        threeRendererRef.current = null;
                    }
                    if (threeAnimationIdRef.current) {
                        cancelAnimationFrame(threeAnimationIdRef.current);
                        threeAnimationIdRef.current = null;
                    }
                    return;
                }

                const container = threeContainerRef.current;
                if (!container) return;

                const width = container.clientWidth || 800;
                const height = 500;

                const themes = {
                    clear: {
                        bg: 0xf1f5f9,
                        ambient: 0x94a3b8,
                        dir: 0xffffff,
                        grass: 0x22c55e,
                        main: 0x2563eb,
                        rear: 0x0f766e,
                        bridge: 0x64748b,
                        path: 0xef4444, 
                        track: 0xfca5a5,
                        edu: 0xd97706,
                        library: 0x8b5cf6
                    },
                    sunset: {
                        bg: 0x180f2a,
                        ambient: 0x4c1d95,
                        dir: 0xfdb147,
                        grass: 0x3b0764,
                        main: 0xf0abfc,
                        rear: 0x14b8a6,
                        bridge: 0xf43f5e,
                        path: 0x38bdf8, 
                        track: 0x741337,
                        edu: 0xf59e0b,
                        library: 0xc084fc
                    },
                    cyber: {
                        bg: 0x030712,
                        ambient: 0x1e1b4b,
                        dir: 0x06b6d4,
                        grass: 0x022c22,
                        main: 0x0284c7,
                        rear: 0x0d9488,
                        bridge: 0xdb2777,
                        path: 0x00ffcc, 
                        track: 0x3b0764,
                        edu: 0xe11d48,
                        library: 0xa855f7
                    }
                };

                const currentThemeData = themes[theme];

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(currentThemeData.bg);
                threeSceneRef.current = scene;

                const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
                camera.position.set(0, 65, 80);
                threeCameraRef.current = camera;

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(width, height);
                renderer.shadowMap.enabled = true;
                container.innerHTML = '';
                container.appendChild(renderer.domElement);
                threeRendererRef.current = renderer;

                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.maxPolarAngle = Math.PI / 2.05; 
                controls.minDistance = 15;
                controls.maxDistance = 180;
                threeControlsRef.current = controls;

                const ambientLight = new THREE.AmbientLight(currentThemeData.ambient, 1.4);
                scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(currentThemeData.dir, 1.6);
                dirLight.position.set(30, 80, 20);
                dirLight.castShadow = true;
                scene.add(dirLight);

                // Grid mapping conversions
                const scaleX = (val) => (val - 400) * 0.12; 
                const scaleZ = (val) => (val - 450) * 0.12; 
                const scaleY = (fl) => (fl - 1) * 3.8 + 0.5; 

                // Grass Plate
                const groundGeo = new THREE.BoxGeometry(130, 1.5, 130);
                const groundMat = new THREE.MeshStandardMaterial({ color: currentThemeData.grass, roughness: 0.9 });
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.position.y = -1;
                ground.receiveShadow = true;
                scene.add(ground);

                // Athletics Track Loop
                const trackGeo = new THREE.RingGeometry(14, 20, 32);
                const trackMat = new THREE.MeshBasicMaterial({ color: currentThemeData.track, side: THREE.DoubleSide });
                const track = new THREE.Mesh(trackGeo, trackMat);
                track.rotation.x = Math.PI / 2;
                track.position.set(scaleX(400), -0.2, scaleZ(660)); 
                scene.add(track);

                // Yongbong Gym (체육관)
                const gymGeo = new THREE.BoxGeometry(160 * 0.12, 10, 120 * 0.12);
                const gymMat = new THREE.MeshStandardMaterial({ color: 0x475569, transparent: true, opacity: 0.75, roughness: 0.2 });
                const gym = new THREE.Mesh(gymGeo, gymMat);
                gym.position.set(scaleX(100), 5, scaleZ(660)); 
                scene.add(gym);

                // Yongbong Edu Center
                const eduGeo = new THREE.BoxGeometry(110 * 0.12, 8.5, 100 * 0.12);
                const eduMat = new THREE.MeshStandardMaterial({ color: currentThemeData.edu, transparent: true, opacity: 0.75 });
                const edu = new THREE.Mesh(eduGeo, eduMat);
                edu.position.set(scaleX(100), 4.25, scaleZ(760));
                scene.add(edu);

                // Outdoor Library
                const libGeo = new THREE.BoxGeometry(80 * 0.12, 5, 80 * 0.12);
                const libMat = new THREE.MeshStandardMaterial({ color: currentThemeData.library, transparent: true, opacity: 0.8 });
                const library = new THREE.Mesh(libGeo, libMat);
                library.position.set(scaleX(680), 2.5, scaleZ(150));
                scene.add(library);

                // Main Building (본동 - 3 Floors)
                const mainBldgGeo = new THREE.BoxGeometry(500 * 0.12, 12, 80 * 0.12);
                const mainBldgMat = new THREE.MeshStandardMaterial({ color: currentThemeData.main, transparent: true, opacity: 0.6 });
                const mainBuilding = new THREE.Mesh(mainBldgGeo, mainBldgMat);
                mainBuilding.position.set(scaleX(400), 6, scaleZ(500));
                scene.add(mainBuilding);

                // Rear Building (후동 - 4 Floors)
                const rearBldgGeo = new THREE.BoxGeometry(450 * 0.12, 16, 70 * 0.12);
                const rearBldgMat = new THREE.MeshStandardMaterial({ color: currentThemeData.rear, transparent: true, opacity: 0.6 });
                const rearBuilding = new THREE.Mesh(rearBldgGeo, rearBldgMat);
                rearBuilding.position.set(scaleX(310), 8, scaleZ(220));
                scene.add(rearBuilding);

                // Cafeteria Floating Block (2.5층 급식소)
                const cafeGeo = new THREE.BoxGeometry(100 * 0.12, 6, 110 * 0.12);
                const cafeMat = new THREE.MeshStandardMaterial({ color: 0xec4899, transparent: true, opacity: 0.8 });
                const cafeteriaBldg = new THREE.Mesh(cafeGeo, cafeMat);
                cafeteriaBldg.position.set(scaleX(650), 6.5, scaleZ(350)); 
                scene.add(cafeteriaBldg);

                // Sky Bridges (구름다리)
                // Bridge 1: Main Bldg 2F/3F to Cafeteria
                const bridge1Geo = new THREE.BoxGeometry(8 * 0.12, 1.5, 160 * 0.12);
                const bridgeMat = new THREE.MeshStandardMaterial({ color: currentThemeData.bridge });
                const bridge1 = new THREE.Mesh(bridge1Geo, bridgeMat);
                bridge1.position.set(scaleX(650), 6.5, scaleZ(425));
                scene.add(bridge1);

                // Bridge 2: Cafeteria to Rear Bldg
                const bridge2 = new THREE.Mesh(bridge1Geo, bridgeMat);
                bridge2.position.set(scaleX(500), 6.5, scaleZ(285));
                bridge2.rotation.y = Math.PI / 4; 
                scene.add(bridge2);

                // Render Nodes as small glow spheres
                Object.values(MAP_NODES).forEach(node => {
                    const sphereGeo = new THREE.SphereGeometry(0.8, 16, 16);
                    const isStart = node.id === startNode;
                    const isEnd = node.id === endNode;
                    const color = isStart ? 0x22c55e : isEnd ? 0xef4444 : 0x64748b;
                    const sphereMat = new THREE.MeshBasicMaterial({ color: color });
                    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                    sphere.position.set(scaleX(node.x), scaleY(node.floor), scaleZ(node.y));
                    scene.add(sphere);
                });

                // Render the path
                let pathPoints = [];
                if (activePath.length > 1) {
                    activePath.forEach(nodeId => {
                        const node = MAP_NODES[nodeId];
                        if (node) {
                            pathPoints.push(new THREE.Vector3(scaleX(node.x), scaleY(node.floor) + 0.2, scaleZ(node.y)));
                        }
                    });

                    const curve = new THREE.CatmullRomCurve3(pathPoints);
                    const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.4, 8, false);
                    const tubeMat = new THREE.MeshStandardMaterial({ color: currentThemeData.path, emissive: currentThemeData.path, emissiveIntensity: 0.5 });
                    const tube = new THREE.Mesh(tubeGeo, tubeMat);
                    scene.add(tube);
                    threePathTubeRef.current = tube;

                    // Moving Avatar representation
                    const avatarGeo = new THREE.SphereGeometry(0.9, 16, 16);
                    const avatarMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                    const avatar = new THREE.Mesh(avatarGeo, avatarMat);
                    scene.add(avatar);
                    threeAvatarMeshRef.current = avatar;
                }

                // Animation loop
                let animFrame = 0;
                const animate = () => {
                    threeAnimationIdRef.current = requestAnimationFrame(animate);
                    
                    if (threeControlsRef.current) threeControlsRef.current.update();

                    // Animate Avatar along the path
                    if (activePath.length > 1 && threeAvatarMeshRef.current && pathPoints.length > 0) {
                        const progress = (isSimulating ? walkingAnim : animFrame % 100) / 100;
                        const curve = new THREE.CatmullRomCurve3(pathPoints);
                        const pos = curve.getPointAt(progress);
                        threeAvatarMeshRef.current.position.copy(pos);
                    }

                    if (!isSimulating) {
                        animFrame += 0.5;
                    }

                    if (threeRendererRef.current && threeSceneRef.current && threeCameraRef.current) {
                        threeRendererRef.current.render(threeSceneRef.current, threeCameraRef.current);
                    }
                };

                animate();

                // Clean-up on unmount / prop changes
                return () => {
                    if (threeRendererRef.current) {
                        threeRendererRef.current.dispose();
                    }
                    if (threeAnimationIdRef.current) {
                        cancelAnimationFrame(threeAnimationIdRef.current);
                    }
                };
            }, [activeTab, startNode, endNode, isSimulating, walkingAnim, theme, activePath]);

            // Draw 2D Canvas Fallback / Overview Map
            useEffect(() => {
                if (activeTab !== 'view-2d') return;
                const canvas = canvasRef.current;
                if (!canvas) return;

                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw background grid lines
                ctx.strokeStyle = '#1e293b';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let j = 0; j < canvas.height; j += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, j);
                    ctx.lineTo(canvas.width, j);
                    ctx.stroke();
                }

                // Draw Buildings boundaries (Zone mapping)
                // Main Building
                ctx.fillStyle = 'rgba(37, 99, 235, 0.15)';
                ctx.strokeStyle = 'rgba(37, 99, 235, 0.6)';
                ctx.lineWidth = 2;
                ctx.fillRect(100, 440, 600, 100);
                ctx.strokeRect(100, 440, 600, 100);
                ctx.fillStyle = '#e2e8f0';
                ctx.font = 'bold 13px sans-serif';
                ctx.fillText("본동 (Main Building - 1F~3F)", 120, 530);

                // Rear Building
                ctx.fillStyle = 'rgba(15, 118, 110, 0.15)';
                ctx.strokeStyle = 'rgba(15, 118, 110, 0.6)';
                ctx.fillRect(80, 160, 500, 100);
                ctx.strokeRect(80, 160, 500, 100);
                ctx.fillStyle = '#e2e8f0';
                ctx.fillText("후동 (Rear Building - 1F~4F)", 100, 250);

                // Gym & Edu Center
                ctx.fillStyle = 'rgba(100, 116, 139, 0.15)';
                ctx.strokeStyle = 'rgba(100, 116, 139, 0.6)';
                ctx.fillRect(40, 580, 140, 180);
                ctx.strokeRect(40, 580, 140, 180);
                ctx.fillText("용봉체육관 & 에듀센터", 50, 750);

                // Cafeteria
                ctx.fillStyle = 'rgba(236, 72, 153, 0.15)';
                ctx.strokeStyle = 'rgba(236, 72, 153, 0.6)';
                ctx.fillRect(600, 280, 120, 100);
                ctx.strokeRect(600, 280, 120, 100);
                ctx.fillText("학생급식실 (2.5F)", 610, 370);

                // Draw Edges (Path network)
                MAP_EDGES.forEach(edge => {
                    const uNode = MAP_NODES[edge.u];
                    const vNode = MAP_NODES[edge.v];
                    if (!uNode || !vNode) return;

                    ctx.beginPath();
                    ctx.moveTo(uNode.x, uNode.y);
                    ctx.lineTo(vNode.x, vNode.y);
                    ctx.strokeStyle = edge.type === 'stair' ? '#f59e0b' : edge.type === 'bridge' ? '#ec4899' : '#334155';
                    ctx.lineWidth = edge.type === 'bridge' ? 4 : 2;
                    ctx.setLineDash(edge.type === 'stair' ? [4, 4] : []);
                    ctx.stroke();
                });
                ctx.setLineDash([]);

                // Draw Active Dijkstra Route Path
                if (activePath.length > 1) {
                    ctx.beginPath();
                    const startNodeObj = MAP_NODES[activePath[0]];
                    ctx.moveTo(startNodeObj.x, startNodeObj.y);
                    for (let i = 1; i < activePath.length; i++) {
                        const targetNodeObj = MAP_NODES[activePath[i]];
                        ctx.lineTo(targetNodeObj.x, targetNodeObj.y);
                    }
                    ctx.strokeStyle = '#10b981';
                    ctx.lineWidth = 6;
                    ctx.stroke();

                    // Simulating pulse dot along path
                    const dotIndex = Math.floor((walkingAnim / 100) * (activePath.length - 1));
                    const nextDotIndex = Math.min(dotIndex + 1, activePath.length - 1);
                    const n1 = MAP_NODES[activePath[dotIndex]];
                    const n2 = MAP_NODES[activePath[nextDotIndex]];
                    if (n1 && n2) {
                        const t = (walkingAnim % (100 / (activePath.length - 1))) / (100 / (activePath.length - 1));
                        const curX = n1.x + (n2.x - n1.x) * (isNaN(t) ? 0 : t);
                        const curY = n1.y + (n2.y - n1.y) * (isNaN(t) ? 0 : t);
                        ctx.beginPath();
                        ctx.arc(curX, curY, 8, 0, 2 * Math.PI);
                        ctx.fillStyle = '#f59e0b';
                        ctx.fill();
                    }
                }

                // Draw Nodes
                Object.values(MAP_NODES).forEach(node => {
                    const isStart = node.id === startNode;
                    const isEnd = node.id === endNode;

                    ctx.beginPath();
                    ctx.arc(node.x, node.y, isStart || isEnd ? 10 : 6, 0, 2 * Math.PI);
                    ctx.fillStyle = isStart ? '#22c55e' : isEnd ? '#ef4444' : '#475569';
                    ctx.fill();
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    // Node Label details if hovered or active
                    if (isStart || isEnd || node.floor === activeFloor) {
                        ctx.fillStyle = '#ffffff';
                        ctx.font = 'bold 11px sans-serif';
                        ctx.fillText(node.name.split(' ')[0], node.x + 12, node.y + 4);
                    }
                });

            }, [activeTab, startNode, endNode, activeFloor, walkingAnim, activePath]);

            return (
                <div className="min-h-screen bg-[#070a13] flex flex-col">
                    {/* Header bar */}
                    <header className="border-b border-slate-800 bg-slate-950/60 backdrop-blur-md sticky top-0 z-50 px-4 py-3">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-blue-600 rounded-xl text-white shadow-lg shadow-blue-500/20">
                                    <i className="fa-solid fa-map-location-dot text-2xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                                        강릉제일고 스마트 네비게이션 
                                        <span className="text-xs bg-emerald-500/20 text-emerald-400 px-2.5 py-0.5 rounded-full font-medium border border-emerald-500/30">v2.1 Stable</span>
                                    </h1>
                                    <p className="text-xs text-slate-400">Dijkstra 알고리즘 기반 3D 입체 캠퍼스 가이드맵</p>
                                </div>
                            </div>

                            {/* Center search engine */}
                            <div className="relative w-full md:w-96">
                                <div className="flex gap-1 p-1 bg-slate-900 rounded-lg border border-slate-700">
                                    <select 
                                        value={searchType} 
                                        onChange={(e) => setSearchType(e.target.value)}
                                        className="bg-transparent text-xs text-slate-300 font-semibold focus:outline-none px-2 border-r border-slate-700"
                                    >
                                        <option value="destination" className="bg-slate-900">도착지 검색</option>
                                        <option value="start" className="bg-slate-900">출발지 검색</option>
                                    </select>
                                    <input 
                                        type="text" 
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        placeholder="교실, 보건실, 미래관 등 검색..."
                                        className="bg-transparent text-xs text-white placeholder-slate-500 focus:outline-none flex-1 px-2 py-1"
                                    />
                                    {searchQuery && (
                                        <button onClick={() => setSearchQuery('')} className="text-slate-400 hover:text-white px-1">
                                            <i className="fa-solid fa-circle-xmark"></i>
                                        </button>
                                    )}
                                </div>

                                {/* Instant search dropdown results */}
                                {searchQuery && (
                                    <div className="absolute top-full left-0 right-0 mt-2 bg-slate-950/95 border border-slate-700 rounded-xl shadow-2xl z-50 max-h-60 overflow-y-auto divide-y divide-slate-800">
                                        {filteredNodes.length > 0 ? (
                                            filteredNodes.map(node => (
                                                <button
                                                    key={node.id}
                                                    onClick={() => handleSearchResultSelect(node.id)}
                                                    className="w-full text-left px-4 py-2.5 hover:bg-blue-600/20 flex flex-col gap-0.5 transition-colors"
                                                >
                                                    <span className="text-xs font-semibold text-white">{node.name}</span>
                                                    <span className="text-[10px] text-slate-400 line-clamp-1">{node.desc}</span>
                                                </button>
                                            ))
                                        ) : (
                                            <div className="px-4 py-4 text-center text-xs text-slate-500">일치하는 장소가 없습니다.</div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* Theme switcher */}
                            <div className="flex items-center gap-2">
                                <span className="text-xs text-slate-400 font-medium hidden lg:inline">🎨 테마:</span>
                                <div className="flex bg-slate-900/80 p-1 rounded-lg border border-slate-800">
                                    {['sunset', 'cyber', 'clear'].map(t => (
                                        <button
                                            key={t}
                                            onClick={() => setTheme(t)}
                                            className={`text-xs px-2.5 py-1 rounded-md uppercase font-bold transition-all ${
                                                theme === t ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-400 hover:text-white'
                                            }`}
                                        >
                                            {t}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Dashboard grid layout */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-5">
                        
                        {/* Left sidebar controller (4 Cols) */}
                        <div className="lg:col-span-4 flex flex-col gap-4">
                            
                            {/* Navigation Source & Dest select box */}
                            <div className="glass-panel rounded-2xl p-4 flex flex-col gap-4 shadow-xl">
                                <h2 className="text-sm font-bold text-slate-200 tracking-wide flex items-center gap-2">
                                    <i className="fa-solid fa-compass text-blue-500"></i> 길찾기 연동 제어판
                                </h2>

                                <div className="flex flex-col gap-3">
                                    {/* Start Node Dropdown */}
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-[11px] text-slate-400 uppercase font-semibold tracking-wider flex items-center gap-1.5">
                                            <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                            출발지 설정 (Start Node)
                                        </label>
                                        <select
                                            value={startNode}
                                            onChange={(e) => {
                                                setStartNode(e.target.value);
                                                setVoiceMessage(`출발지가 [${MAP_NODES[e.target.value].name}]으로 연동되었습니다.`);
                                            }}
                                            className="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-white font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 w-full"
                                        >
                                            {Object.entries(MAP_NODES).map(([id, node]) => (
                                                <option key={id} value={id}>{node.name} ({node.floor}F)</option>
                                            ))}
                                        </select>
                                    </div>

                                    {/* Swapper button */}
                                    <div className="flex justify-center -my-1">
                                        <button 
                                            onClick={() => {
                                                const temp = startNode;
                                                setStartNode(endNode);
                                                setEndNode(temp);
                                                setVoiceMessage("출발지와 목적지를 맞교환하였습니다.");
                                            }}
                                            className="p-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg border border-slate-700 hover:text-white hover-scale transition-all"
                                            title="출발지 / 목적지 교환"
                                        >
                                            <i className="fa-solid fa-arrows-up-down"></i>
                                        </button>
                                    </div>

                                    {/* End Node Dropdown */}
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-[11px] text-slate-400 uppercase font-semibold tracking-wider flex items-center gap-1.5">
                                            <span className="w-2 h-2 rounded-full bg-red-500"></span>
                                            목적지 설정 (Destination Node)
                                        </label>
                                        <select
                                            value={endNode}
                                            onChange={(e) => {
                                                setEndNode(e.target.value);
                                                setVoiceMessage(`도착지가 [${MAP_NODES[e.target.value].name}]으로 연동되었습니다.`);
                                            }}
                                            className="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-white font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 w-full"
                                        >
                                            {Object.entries(MAP_NODES).map(([id, node]) => (
                                                <option key={id} value={id}>{node.name} ({node.floor}F)</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>

                                {/* Barrier Free / Wheelchair Toggle */}
                                <div className="bg-slate-900/60 p-3 rounded-xl border border-slate-800 flex items-center justify-between">
                                    <div className="flex items-center gap-2.5">
                                        <div className="p-2 bg-blue-500/10 text-blue-400 rounded-lg">
                                            <i className="fa-solid fa-wheelchair text-sm"></i>
                                        </div>
                                        <div>
                                            <h3 className="text-xs font-bold text-white">무장애 (Barrier-Free)</h3>
                                            <p className="text-[10px] text-slate-400">교내 계단 이동 경로 배제 우회</p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => {
                                            setIsBarrierFree(!isBarrierFree);
                                            setVoiceMessage(isBarrierFree ? "무장애 경로 설정을 비활성화했습니다." : "무장애 휠체어 전용 경로 안내를 가동합니다. 계단 경로가 자동 제외됩니다.");
                                        }}
                                        className={`w-11 h-6 rounded-full transition-all relative ${
                                            isBarrierFree ? 'bg-blue-600' : 'bg-slate-700'
                                        }`}
                                    >
                                        <span className={`absolute top-1 left-1 bg-white w-4 h-4 rounded-full transition-all ${
                                            isBarrierFree ? 'translate-x-5' : 'translate-x-0'
                                        }`}></span>
                                    </button>
                                </div>

                                {/* Guidance action trigger */}
                                <button
                                    onClick={triggerGuidance}
                                    disabled={isSimulating}
                                    className="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 disabled:from-slate-800 disabled:to-slate-800 text-xs font-bold text-white rounded-xl shadow-lg shadow-blue-500/15 hover-scale transition-all uppercase tracking-wide flex items-center justify-center gap-2"
                                >
                                    {isSimulating ? (
                                        <>
                                            <i className="fa-solid fa-person-walking animate-bounce"></i>
                                            시뮬레이션 진행중... ({Math.floor(walkingAnim)}%)
                                        </>
                                    ) : (
                                        <>
                                            <i className="fa-solid fa-route"></i>
                                            실시간 안내 시뮬레이터 가동
                                        </>
                                    )}
                                </button>
                            </div>

                            {/* Live GPS & Voice feedback hub */}
                            <div className="glass-panel rounded-2xl p-4 flex flex-col gap-3 shadow-md border-l-4 border-l-purple-500">
                                <div className="flex items-center justify-between">
                                    <span className="text-[11px] uppercase tracking-wider text-slate-400 font-bold flex items-center gap-1">
                                        <i className="fa-solid fa-bullhorn text-purple-400"></i> 스마트 실시간 음성 피드백
                                    </span>
                                    <button 
                                        onClick={() => {
                                            const newVal = !voiceEnabled;
                                            setVoiceEnabled(newVal);
                                            if (newVal) {
                                                setTimeout(() => speakText("음성 안내 유도가 성공적으로 연결되었습니다."), 100);
                                            }
                                        }}
                                        className={`text-[10px] px-2 py-0.5 rounded-full font-bold border transition-colors ${
                                            voiceEnabled ? 'bg-purple-500/20 text-purple-400 border-purple-500/40' : 'bg-slate-800 text-slate-400 border-slate-700'
                                        }`}
                                    >
                                        {voiceEnabled ? 'ON' : '음성 OFF'}
                                    </button>
                                </div>
                                <div className="bg-slate-950/80 p-3 rounded-xl border border-slate-800 min-h-[70px] flex items-start gap-2.5">
                                    <i className="fa-solid fa-comment-dots text-purple-400 text-sm mt-0.5 animate-pulse"></i>
                                    <p className="text-xs text-slate-300 leading-relaxed font-medium">{voiceMessage}</p>
                                </div>
                            </div>

                            {/* Node Location Information Card */}
                            <div className="glass-panel rounded-2xl p-4 flex flex-col gap-3.5 shadow-md">
                                <h3 className="text-xs font-bold text-slate-200 tracking-wider uppercase flex items-center gap-1.5">
                                    <i className="fa-solid fa-circle-info text-blue-400"></i> 노드 상세 지식정보
                                </h3>
                                <div className="grid grid-cols-2 gap-2">
                                    <div className="bg-slate-900/60 p-2.5 rounded-xl border border-slate-800">
                                        <span className="text-[9px] text-slate-500 block uppercase">출발 노드</span>
                                        <span className="text-xs font-semibold text-emerald-400">{MAP_NODES[startNode]?.name.split(' ')[0]}</span>
                                    </div>
                                    <div className="bg-slate-900/60 p-2.5 rounded-xl border border-slate-800">
                                        <span className="text-[9px] text-slate-500 block uppercase">도착 노드</span>
                                        <span className="text-xs font-semibold text-red-400">{MAP_NODES[endNode]?.name.split(' ')[0]}</span>
                                    </div>
                                </div>
                                <div className="bg-slate-950/40 p-3 rounded-xl border border-slate-800">
                                    <span className="text-[9px] text-slate-500 block uppercase mb-1">도착지 위치 가이드</span>
                                    <p className="text-xs text-slate-300 leading-relaxed">{MAP_NODES[endNode]?.desc}</p>
                                </div>
                            </div>
                        </div>

                        {/* Right interactive map view (8 Cols) */}
                        <div className="lg:col-span-8 flex flex-col gap-4">
                            
                            {/* View Switch Tab Header */}
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-3 bg-slate-950/50 p-2 rounded-2xl border border-slate-800">
                                <div className="flex bg-slate-900 p-1 rounded-xl border border-slate-800 w-full sm:w-auto">
                                    <button
                                        onClick={() => setActiveTab('view-3d')}
                                        className={`flex-1 sm:flex-initial text-xs px-4 py-2 rounded-lg font-bold flex items-center justify-center gap-2 transition-all ${
                                            activeTab === 'view-3d' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'
                                        }`}
                                    >
                                        <i className="fa-solid fa-cube"></i> 가상 3D 캠퍼스 뷰
                                    </button>
                                    <button
                                        onClick={() => setActiveTab('view-2d')}
                                        className={`flex-1 sm:flex-initial text-xs px-4 py-2 rounded-lg font-bold flex items-center justify-center gap-2 transition-all ${
                                            activeTab === 'view-2d' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'
                                        }`}
                                    >
                                        <i className="fa-solid fa-map"></i> 평면 2D 오버뷰
                                    </button>
                                </div>

                                {/* Active floor filter */}
                                <div className="flex items-center gap-1 w-full sm:w-auto justify-end">
                                    <span className="text-[11px] text-slate-400 font-bold uppercase mr-1">지하/층층 기준선:</span>
                                    {[1, 2, 2.5, 3, 4].map(f => (
                                        <button
                                            key={f}
                                            onClick={() => setActiveFloor(f)}
                                            className={`w-8 h-8 rounded-lg text-xs font-bold transition-all ${
                                                activeFloor === f ? 'bg-blue-600 text-white shadow' : 'bg-slate-900 text-slate-400 hover:text-white'
                                            }`}
                                        >
                                            {f === 2.5 ? '급식' : `${f}F`}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Viewport Box */}
                            <div className="relative glass-panel rounded-2xl overflow-hidden shadow-2xl min-h-[500px] border border-slate-700/60 flex flex-col justify-between">
                                
                                {activeTab === 'view-3d' ? (
                                    /* Three.js Container */
                                    <div ref={threeContainerRef} className="absolute inset-0 w-full h-[500px]"></div>
                                ) : (
                                    /* 2D Canvas Fallback Container */
                                    <div className="relative w-full h-[500px] bg-slate-950 flex items-center justify-center overflow-auto">
                                        <canvas 
                                            ref={canvasRef} 
                                            width={1000} 
                                            height={1000} 
                                            className="w-[500px] h-[500px] md:w-[700px] md:h-[700px] bg-[#070a13]"
                                        />
                                        <div className="absolute top-3 left-3 bg-slate-900/90 px-3 py-1.5 rounded-lg border border-slate-800 text-[10px] text-slate-400 flex flex-col gap-1">
                                            <div className="flex items-center gap-1.5">
                                                <span className="w-2.5 h-1.5 bg-pink-500 rounded-full inline-block"></span>
                                                본동-후동 하늘다리 (2F / 3F)
                                            </div>
                                            <div className="flex items-center gap-1.5">
                                                <span className="w-2.5 h-1.5 border border-dashed border-yellow-500 rounded-full inline-block"></span>
                                                교내 비상 계단
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Floating Path Statistics overlays */}
                                <div className="absolute bottom-4 left-4 right-4 pointer-events-none flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3 bg-slate-950/90 border border-slate-700/80 p-3.5 rounded-xl backdrop-blur-md">
                                    <div className="flex items-center gap-4">
                                        <div className="flex items-center gap-2">
                                            <div className="p-2 bg-emerald-500/10 text-emerald-400 rounded-lg">
                                                <i className="fa-solid fa-person-walking text-lg"></i>
                                            </div>
                                            <div>
                                                <span className="text-[9px] text-slate-500 block uppercase font-bold">인도 실거리</span>
                                                <span className="text-sm font-bold text-white">{pathStats.distance} m</span>
                                            </div>
                                        </div>
                                        <div className="h-8 w-[1px] bg-slate-800"></div>
                                        <div className="flex items-center gap-2">
                                            <div className="p-2 bg-blue-500/10 text-blue-400 rounded-lg">
                                                <i className="fa-solid fa-clock text-lg"></i>
                                            </div>
                                            <div>
                                                <span className="text-[9px] text-slate-500 block uppercase font-bold">예상 도보 시간</span>
                                                <span className="text-sm font-bold text-white">약 {pathStats.time} 초</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="text-[10px] text-slate-400 text-right font-medium self-end sm:self-center">
                                        <i className="fa-solid fa-circle-exclamation text-blue-400 mr-1"></i>
                                        마우스 좌클릭 드래그로 3D 회전, 우클릭으로 패닝이 가능합니다.
                                    </div>
                                </div>
                            </div>

                            {/* Section: Written turn-by-turn directions */}
                            <div className="glass-panel rounded-2xl p-4 flex flex-col gap-4 shadow-lg">
                                <div className="flex items-center justify-between">
                                    <h3 className="text-sm font-bold text-slate-200 tracking-wide flex items-center gap-2">
                                        <i className="fa-solid fa-list-ol text-blue-500"></i> 순차적 이동 가이드 (총 {directionsList.length}단계)
                                    </h3>
                                    <span className="text-[10px] bg-slate-800 px-2.5 py-1 rounded-full text-slate-400 font-bold border border-slate-700">
                                        Dijkstra Path Plan
                                    </span>
                                </div>

                                {directionsList.length > 0 ? (
                                    <div className="flex flex-col gap-2.5 max-h-72 overflow-y-auto pr-1">
                                        {directionsList.map((step, index) => (
                                            <div 
                                                key={index} 
                                                className={`p-3 rounded-xl border flex items-start gap-3 transition-colors ${
                                                    isSimulating && (walkingAnim / 100) * directionsList.length >= index
                                                        ? 'bg-blue-950/30 border-blue-500/50' 
                                                        : 'bg-slate-900/40 border-slate-800 hover:border-slate-700'
                                                }`}
                                            >
                                                <div className="w-6 h-6 rounded-full bg-slate-800 flex items-center justify-center text-[10px] font-black text-blue-400 border border-slate-700 flex-shrink-0 mt-0.5">
                                                    {index + 1}
                                                </div>
                                                <div className="flex-1">
                                                    <p className="text-xs text-slate-200 leading-relaxed font-semibold">{step.description}</p>
                                                    <div className="flex items-center gap-2 mt-1.5 text-[9px] font-bold text-slate-500">
                                                        <span>{step.from.name.split(' ')[0]}</span>
                                                        <i className="fa-solid fa-arrow-right-long text-[8px]"></i>
                                                        <span className="text-slate-400">{step.to.name.split(' ')[0]}</span>
                                                        <span className="text-slate-600">•</span>
                                                        <span className="text-slate-400">{step.distance}m 이동</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="text-center py-8 bg-slate-900/30 rounded-xl border border-slate-800 flex flex-col items-center gap-2">
                                        <i className="fa-solid fa-route text-slate-600 text-2xl animate-pulse"></i>
                                        <p className="text-xs text-slate-400 font-semibold">동일한 장소를 선택했거나 유효한 최단 경로가 없습니다.</p>
                                    </div>
                                )}
                            </div>

                        </div>
                    </main>

                    {/* Footer attribution */}
                    <footer className="border-t border-slate-800 bg-slate-950/80 py-4 px-4 mt-8 text-center text-[11px] text-slate-500">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-2">
                            <span>Copyright &copy; 2026 Gangneung Jeil High School Smart Campus Navigation. All Rights Reserved.</span>
                            <div className="flex gap-4">
                                <a href="#" className="hover:text-white transition-colors">이용 약관</a>
                                <a href="#" className="hover:text-white transition-colors">안전 대피 요령</a>
                                <a href="#" className="hover:text-white transition-colors">관리자 모드</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
